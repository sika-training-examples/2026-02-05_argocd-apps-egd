apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps-k3s
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: app-of-apps
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
  source:
    path: ./clusters/k3s
    repoURL: https://gitlab.sikademo.com/egd/argocd-apps-egd.git
    directory:
      recurse: true
      exclude: '{**/manifests/**,**/Chart.yaml,**/values.y*ml,**/*.values.y*ml,**/templates/**}'
