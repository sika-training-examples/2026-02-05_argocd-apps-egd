apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-egd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: hello-egd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/sikalabs/charts
    path: ./charts/hello-world
    helm:
      valuesObject:
        host: hello-egd.egd-k3s.sikademo.com
        image: ghcr.io/sikalabs/hello-world-server:egd
