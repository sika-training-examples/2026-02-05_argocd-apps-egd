apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
spec:
  serviceAccount:
    name: collector
  outputs:
    - name: loki-lab0
      type: loki
      loki:
        url: http://lab0.sikademo.com:3100
        labelKeys:
          - kubernetes.namespace_name
          - kubernetes.pod_name
          - kubernetes.container_name
    - name: loki
      type: loki
      url: https://loki-gateway-http.openshift-logging.svc:8080
      loki:
        tenantKey: log_type
        labelKeys:
          - kubernetes.namespace_name
          - kubernetes.pod_name
          - kubernetes.container_name
      secret:
        name: loki-gateway-token

  pipelines:
    - name: all-to-loki
      inputRefs:
        - application
        - infrastructure
        - audit
      outputRefs:
        - loki-lab0
        - loki
