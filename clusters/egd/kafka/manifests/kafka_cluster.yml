apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: egd
  namespace: kafka
spec:
  kafka:
    version: 4.1.1
    metadataVersion: 4.1-IV1
    authorization:
      type: simple
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: nodeport
        port: 19092
        type: nodeport
        tls: false
      - name: lb
        port: 29092
        type: loadbalancer
        tls: false
      # - name: lbtls
      #   port: 29093
      #   type: loadbalancer
      #   tls: true
      #   authentication:
      #     type: tls
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 3
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
