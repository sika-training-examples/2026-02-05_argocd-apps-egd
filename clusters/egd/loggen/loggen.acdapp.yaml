apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loggen
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: loggen
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/sikalabs/charts.git
    path: charts/loggen
    helm:
      valuesObject:
        # https://github.com/sikalabs/charts/blob/master/charts/loggen/values.yaml
        replicas: 4
