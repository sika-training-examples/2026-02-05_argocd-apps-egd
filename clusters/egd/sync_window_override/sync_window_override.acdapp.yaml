apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sync-window-override
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sync-window-override
  destination:
    namespace: sync-window-override
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/sikalabs/charts.git
    path: charts/hello-world
    helm:
      valuesObject:
        # https://github.com/sikalabs/charts/blob/master/charts/hello-world/values.yaml

        host: sync-window-override.apps.egd.germanywestcentral.aroapp.io
        replicas: 3
        TEXT: "sync-window-override"
        TEXT_SUFFIX: v3

        ingressClassName: openshift-default
        ingressTlsDisable: true
        ingressExtraAnnotations:
          route.openshift.io/termination: edge
          route.openshift.io/insecureEdgeTerminationPolicy: Redirect
