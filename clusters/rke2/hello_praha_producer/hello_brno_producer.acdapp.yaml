apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-praha-producer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: hello-praha-producer
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://gitlab.sikademo.com/egd/argocd-apps-egd.git
      path: ./clusters/rke2/hello_praha_producer/manifests
