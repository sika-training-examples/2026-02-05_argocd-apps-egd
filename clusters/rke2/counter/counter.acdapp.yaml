apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ondrej-counter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-99"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: ondrej-counter
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/sika-training-examples/2026-02-05_counter_egd_helm_example.git
    path: .
    helm:
      valuesObject:
        # https://github.com/sika-training-examples/2026-02-05_counter_egd_helm_example/blob/master/values.yaml

        host: ondrej-counter.egd-rke2.sikademo.com
        EXTRA_TEXT: v4

  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: frontend
      jsonPointers:
        - /spec/replicas
